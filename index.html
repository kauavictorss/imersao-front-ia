<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Página de login da Netflix. Escolha seu perfil e comece a assistir agora.">
    <title>Netflix - Quem está assistindo?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap&font-display=swap"
          rel="stylesheet">
    <link rel="preload" href="assets/fundo-flix.jpg" as="image">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preload" href="assets/fundo-flix.jpg" as="image">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<header>
    <h1 id="titulo-perfis">Quem está assistindo?</h1>
</header>

<main>
    <section aria-label="perfis">
        <ul id="profiles-list" class="profiles">
            <!-- Gerado dinamicamente via JS -->
        </ul>
        <div class="manage-button-container">
            <button id="btn-manage" class="btn-secondary">Gerenciar perfis</button>
        </div>
    </section>

    <!-- Modal para Adicionar/Editar Perfil -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Editar perfil</h2>
            <div class="modal-body">
                <div class="profile-edit-header">
                    <div class="profile-edit-preview">
                        <img id="modal-profile-img" src="assets/perfil-1.png" alt="Preview">
                    </div>
                    <div class="image-selector">
                        <p>Escolha um ícone para o seu perfil:</p>
                        <div class="image-options">
                            <img src="assets/perfil-1.png" class="img-option" data-img="assets/perfil-1.png" alt="Ícone de perfil 1">
                            <img src="assets/perfil-2.png" class="img-option" data-img="assets/perfil-2.png" alt="Ícone de perfil 2">
                            <img src="assets/perfil-3.png" class="img-option" data-img="assets/perfil-3.png" alt="Ícone de perfil 3">
                            <img src="assets/perfil-4.png" class="img-option" data-img="assets/perfil-4.png" alt="Ícone de perfil 4">
                            <img src="assets/perfil-5.png" class="img-option" data-img="assets/perfil-5.png" alt="Ícone de perfil 5">
                            <img src="assets/perfil-6.png" class="img-option" data-img="assets/perfil-6.png" alt="Ícone de perfil 6">
                        </div>
                    </div>
                </div>
                <div class="profile-edit-info">
                    <input type="text" id="modal-profile-name" placeholder="Nome do perfil">
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-save-profile" class="btn-primary">Salvar</button>
                <button id="btn-cancel-modal" class="btn-secondary">Cancelar</button>
                <button id="btn-delete-profile" class="btn-danger" style="display: none;">Excluir</button>
            </div>
        </div>
    </div>
</main>
<script src="scripts/index.js"></script>
</body>
</html>
