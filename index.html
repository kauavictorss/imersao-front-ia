<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Netflix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1 id="titulo-perfis">Quem está assistindo?</h1>
</header>

<main>
    <section aria-label="titulo-perfis">
        <ul class="profiles">
            <li class="profile">
                <figure>
                    <img src="assets/perfil-1.png"
                         alt="O mestre da estrutura que transforma lógica complexa em arquiteturas digitais robustas e escaláveis."
                         width="300">
                    <figcaption>Davy</figcaption>
                </figure>
            </li>
            <li class="profile">
                <figure>
                    <img src="assets/perfil-2.png"
                         alt="O visionário que quebra paradigmas de UI/UX para criar experiências de utilizador ousadas, fluidas e inesquecíveis."
                         width="300">
                    <figcaption>Kauã</figcaption>
                </figure>
            </li>
            <li class="profile">
                <figure>
                    <img src="assets/perfil-3.png"
                         alt="A artista pixelada que funde estética vibrante com funcionalidade para dar alma e cor ao código."
                         width="300">
                    <figcaption>Gisele</figcaption>
                </figure>
            </li>
        </ul>
