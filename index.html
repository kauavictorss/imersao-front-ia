<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Netflix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1 id="titulo-perfis">Quem está assistindo?</h1>
</header>

<main>
    <section aria-label="titulo-perfis">
        <ul class="profiles">
            <li class="profile">
                <figure>
                    <img src="assets/perfil-1.png"
                         alt="O mestre da estrutura que transforma lógica complexa em arquiteturas digitais robustas e escaláveis.">
                    <figcaption>Davy</figcaption>
                </figure>
            </li>
            <li class="profile">
                <figure>
                    <img src="assets/perfil-2.png"
                         alt="O visionário que quebra paradigmas de UI/UX para criar experiências de utilizador ousadas, fluidas e inesquecíveis.">
                    <figcaption>Kauã</figcaption>
                </figure>
            </li>
            <li class="profile">
                <figure>
                    <img src="assets/perfil-3.png"
                         alt="A artista pixelada que funde estética vibrante com funcionalidade para dar alma e cor ao código.">
                    <figcaption>Gisele</figcaption>
                </figure>
            </li>
            <li class="profile">
                <figure>
                    <img src="assets/perfil-4.png"
                         alt="A desenvolvedora focada na essência, equilibrando performance pura com acessibilidade universal e design limpo.">
                    <figcaption>Giovana</figcaption>
                </figure>
            </li>
            <li class="profile">
                <figure>
                    <img src="assets/perfil-5.png"
                         alt="O especialista em segurança e performance avançada, blindando aplicações com práticas robustas e otimizações de alto nível.">
                    <figcaption>Douglas</figcaption>
                </figure>
            </li>
        </ul>
    </section>
</main>
</body>
</html>
